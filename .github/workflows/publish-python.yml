name: Publish Python to PyPI

# Triggered when a release is published with a tag prefixed `python-v`
# (e.g. `python-v0.1.0`). The prefix is stripped by hatch-vcs so the
# package version remains a clean SemVer string.
on:
  release:
    types:
      - published

permissions:
  contents: read

defaults:
  run:
    working-directory: python

jobs:
  check-tag:
    name: Check tag is python-v*
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.check.outputs.should_publish }}
    steps:
      - id: check
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          if [[ "$TAG_NAME" == python-v* ]]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

  check:
    name: Run checks
    needs: check-tag
    if: needs.check-tag.outputs.should_publish == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install hatch
        run: pip install hatch

      - name: Run checks
        run: hatch run prepare

  build:
    name: Build distribution
    needs: check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install hatch
        run: pip install hatch twine

      - name: Build package
        run: hatch build

      - name: Check distribution
        run: twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: python/dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
